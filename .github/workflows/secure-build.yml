name: Secure Build

on:
  # Pipeline DevSecOps - Secure Build v1.0
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  secure-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build imagem
        run: docker build -t "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" .

      - name: Push imagem
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 20
          command: docker push "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

      - name: Dockle CIS Benchmark
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:latest \
            --exit-code 1 --exit-level fatal \
            "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

      - name: Trivy scan
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: sarif
          output: trivy-results.sarif
          exit-code: 1
          severity: CRITICAL
          scanners: "vuln,secret"

      - name: Verificar SARIF gerado
        if: always()
        run: |
          if [ -f trivy-results.sarif ]; then
            echo "sarif_exists=true" >> "$GITHUB_ENV"
          else
            echo "sarif_exists=false" >> "$GITHUB_ENV"
            echo "::warning::trivy-results.sarif não foi gerado (provável falha em etapa anterior)."
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && env.sarif_exists == 'true'
        with:
          sarif_file: trivy-results.sarif

      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Assinar imagem keyless
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          DIGEST=$(docker inspect --format="{{index .RepoDigests 0}}" "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}")
          cosign sign --yes "$DIGEST"

      - name: Gerar SBOM CycloneDX
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: cyclonedx
          output: sbom.cyclonedx.json

      - name: Publicar SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
