name: Secure Build
on:
  push:
    branches:
    - '**'
  pull_request:
    branches:
      - main
env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/app
  IMAGE_TAG: ${{ github.sha }}
jobs:
  secure-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build imagem
        run: docker build -t "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" .
      - name: Push imagem
        run: docker push "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
      - name: Dockle CIS Benchmark
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:latest \
            --exit-code 1 --exit-level fatal \
            "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: sarif
          output: trivy-results.sarif
          exit-code: 1
          severity: CRITICAL
          scanners: "vuln,secret"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3.5.0
      - name: Assinar imagem keyless
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          DIGEST=$(docker inspect --format="{{index .RepoDigests 0}}" "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}")
          cosign sign --yes "$DIGEST"
      - name: Gerar SBOM CycloneDX
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: cyclonedx
          output: sbom.cyclonedx.json
      - name: Publicar SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
