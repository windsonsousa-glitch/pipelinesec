name: Secure Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: my-image

jobs:
  secure-build:
    name: Secure Build, Scan & Sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # Cosign keyless via OIDC
      security-events: write   # Upload SARIF

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build da imagem
        run: docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      # --- ETAPA 1: CIS Docker Benchmark com Dockle ---
      - name: Dockle - CIS Docker Benchmark
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:v0.4.14 \
            --exit-code 1 --exit-level fatal \
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      # --- ETAPA 2: Trivy - CVEs e Secrets ---
      - name: Trivy - Scan de vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.DOCKER_IMAGE }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # --- ETAPA 3: Cosign - Assinatura keyless ---
      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Assinar imagem (keyless via OIDC)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes \
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      # --- ETAPA 4: SBOM CycloneDX ---
      - name: Gerar SBOM CycloneDX
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.DOCKER_IMAGE }}:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom.cdx.json'

      - name: Publicar SBOM como artefato
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error
